<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Professional Dashcam App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #111;
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Responsive Phone Frame for Desktop / Mobile Native Viewport */
        .phone-frame {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 480px;
            max-height: 850px;
            background: #000;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            border: 8px solid #222;
            border-radius: 40px;
            display: flex;
            flex-direction: column;
        }

        /* Responsive adjustments for true mobile screens */
        @media (max-width: 500px) {
            .phone-frame {
                max-width: 100%;
                max-height: 100%;
                border: none;
                border-radius: 0;
            }
        }

        /* Top Notch Area */
        .phone-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 25px;
            background: #222;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .phone-notch::before {
            content: '';
            width: 50px;
            height: 4px;
            background: #333;
            border-radius: 2px;
        }

        #video-container {
            position: relative;
            flex: 1;
            width: 100%;
            height: 100%;
            background: #000;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px 20px 120px 20px;
        }

        /* Status Bar Style */
        .app-status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            font-size: 13px;
            font-weight: 500;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px 15px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            pointer-events: auto;
        }

        .status-left, .status-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .recording-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff3b30;
            display: none;
        }

        .recording-dot.active {
            display: block;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(1.1); }
        }

        /* HUD overlays */
        .telemetry-hud {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 20px;
        }

        .hud-card {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 12px 18px;
            border: 1px solid rgba(255,255,255,0.1);
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        #speed-display {
            font-size: 38px;
            font-weight: 800;
            color: #00ff88;
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        #speed-display small {
            font-size: 14px;
            color: white;
            font-weight: 400;
        }

        #gps-display {
            font-size: 12px;
            font-weight: 500;
            color: #fff;
            max-width: 180px;
            line-height: 1.4;
        }

        #time-display {
            position: absolute;
            top: 80px;
            right: 20px;
            font-size: 14px;
            font-weight: 600;
            background: rgba(0,0,0,0.6);
            padding: 6px 12px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }

        #status-message {
            position: absolute;
            top: 80px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Controls Panel */
        #controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.6) 80%, transparent 100%);
            padding: 20px 20px 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            pointer-events: auto;
        }

        .buttons-row {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .control-btn {
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .control-btn:active {
            transform: scale(0.9);
        }

        .btn-start {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: #ff3b30;
            color: white;
            font-size: 20px;
        }

        .btn-start.active {
            background: #ff453a;
            border: 4px solid white;
            animation: recordGlow 1.5s infinite;
        }

        @keyframes recordGlow {
            0% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7); }
            70% { box-shadow: 0 0 0 12px rgba(255, 59, 48, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); }
        }

        .btn-emergency {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: #ff9500;
            color: black;
            font-size: 18px;
        }

        .btn-stop {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: #3a3a3c;
            color: white;
            font-size: 18px;
        }

        .btn-stop:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Toggle Options Area */
        .options-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 10px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        #emergency-indicator {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 32px;
            font-weight: 800;
            color: #ff3b30;
            background: rgba(0, 0, 0, 0.85);
            padding: 15px 30px;
            border-radius: 20px;
            border: 2px solid #ff3b30;
            box-shadow: 0 0 30px rgba(255,59,48,0.5);
            animation: emergencyPulse 0.5s infinite;
            display: none;
            pointer-events: none;
            z-index: 999;
        }

        @keyframes emergencyPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.8; }
        }

        /* Back to Dashboard Link */
        .back-link {
            color: #0a84ff;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .back-link:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="phone-frame">
        <div class="phone-notch"></div>
        
        <div id="video-container">
            <video id="video" autoplay playsinline muted></video>

            <div id="overlay">
                <!-- Status Top Bar -->
                <div class="app-status-bar">
                    <div class="status-left">
                        <span class="recording-dot" id="recordingDot"></span>
                        <span id="recordingStatus" style="font-weight: 700; letter-spacing: 0.5px;">STANDBY</span>
                    </div>
                    <div class="status-right">
                        <span id="connectionStatus"><i class="fas fa-circle" style="color: #ff3b30;"></i> Offline</span>
                    </div>
                </div>

                <!-- Floating Info Displays -->
                <div id="status-message">Initializing Camera...</div>
                <div id="time-display">00:00:00</div>

                <!-- Bottom Hud Elements -->
                <div class="telemetry-hud">
                    <div class="hud-card">
                        <div id="gps-display">
                            <i class="fas fa-location-arrow"></i> GPS: Ready
                        </div>
                    </div>
                    <div class="hud-card">
                        <div id="speed-display">
                            0<small>km/h</small>
                        </div>
                    </div>
                </div>

                <!-- Emergency Overlay -->
                <div id="emergency-indicator">🚨 EMERGENCY</div>
            </div>
            
            <!-- Controls Panel -->
            <div id="controls">
                <div class="buttons-row">
                    <button class="control-btn btn-emergency" id="emergencyBtn" title="Trigger SOS"><i class="fas fa-exclamation-triangle"></i></button>
                    <button class="control-btn btn-start" id="recordBtn" title="Start Recording"><i class="fas fa-video"></i></button>
                    <button class="control-btn btn-stop" id="stopBtn" disabled title="Stop and Download"><i class="fas fa-stop"></i></button>
                </div>

                <!-- License Plate Config -->
                <div class="options-row" style="border: none; padding-bottom: 0;">
                    <div style="display: flex; align-items: center; gap: 8px; width: 100%;">
                        <span style="font-size: 11px; font-weight: 600; color: #aaa; white-space: nowrap;"><i class="fas fa-id-card"></i> VEHICLE PLATE:</span>
                        <input type="text" id="plateInput" placeholder="ABC-1234" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: white; border-radius: 8px; padding: 4px 10px; font-size: 12px; font-weight: 700; text-transform: uppercase; outline: none; flex: 1; text-align: center;">
                    </div>
                </div>

                <!-- Bottom Config Options -->
                <div class="options-row">
                    <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Dashboard</a>
                    <span style="font-size: 11px; color: #34c759;" id="gpsModeIndicator"><i class="fas fa-satellite-dish"></i> Hardware GPS Enabled</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // State
        let isRecording = false;
        let recordingId = null;
        let ws = null;
        let mediaStream = null;
        let videoTrack = null;
        let frameInterval = null;
        let watchId = null;
        let reconnectAttempts = 0;
        const maxReconnectAttempts = 10;
        
        // Media Recorder State (For actual high-quality physical video recording & downloading)
        let mediaRecorder = null;
        let recordedChunks = [];
        let recExtension = 'webm';

        // Real GPS State Variables (Absolutely no simulation!)
        let currentLat = 0;
        let currentLng = 0;
        let currentSpeed = 0;

        // High-Precision Real GPS Speed Overrides (Bypasses null speed outputs)
        let lastGpsTime = null;
        let lastLat = null;
        let lastLng = null;

        // OSD Telemetry Video Baking Canvas
        let osdCanvas = document.createElement('canvas');
        let osdCtx = osdCanvas.getContext('2d');
        let osdInterval = null;

        // DOM elements
        const video = document.getElementById('video');
        const recordBtn = document.getElementById('recordBtn');
        const emergencyBtn = document.getElementById('emergencyBtn');
        const stopBtn = document.getElementById('stopBtn');
        const speedDisplay = document.getElementById('speed-display');
        const gpsDisplay = document.getElementById('gps-display');
        const timeDisplay = document.getElementById('time-display');
        const recordingStatus = document.getElementById('recordingStatus');
        const recordingDot = document.getElementById('recordingDot');
        const connectionStatus = document.getElementById('connectionStatus');
        const statusMessage = document.getElementById('status-message');
        const emergencyIndicator = document.getElementById('emergency-indicator');
        const plateInput = document.getElementById('plateInput');
        
        // Load persisted License Plate
        let currentPlate = localStorage.getItem('dashcam_plate') || 'ABC-1234';
        plateInput.value = currentPlate;

        plateInput.addEventListener('input', (e) => {
            currentPlate = e.target.value.toUpperCase() || 'ABC-1234';
            localStorage.setItem('dashcam_plate', currentPlate);
        });

        // Update clock
        function updateTime() {
            const now = new Date();
            timeDisplay.textContent = now.toLocaleTimeString();
        }
        setInterval(updateTime, 1000);
        updateTime();
        
        // Connect WebSocket
        function connectWebSocket() {
            const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${wsProtocol}//${window.location.host}/ws/video/`;
            
            try {
                ws = new WebSocket(wsUrl);
                
                ws.onopen = function() {
                    console.log('WebSocket connected');
                    connectionStatus.innerHTML = '<i class="fas fa-circle" style="color: #34c759;"></i> Online';
                    statusMessage.textContent = 'Ready';
                    reconnectAttempts = 0;
                };
                
                ws.onclose = function() {
                    console.log('WebSocket disconnected');
                    connectionStatus.innerHTML = '<i class="fas fa-circle" style="color: #ff3b30;"></i> Offline';
                    statusMessage.textContent = 'Reconnecting...';
                    
                    if (reconnectAttempts < maxReconnectAttempts) {
                        reconnectAttempts++;
                        setTimeout(connectWebSocket, 3000);
                    }
                };
                
                ws.onerror = function(error) {
                    console.error('WebSocket error:', error);
                };
                
            } catch (e) {
                console.error('WebSocket connection failed:', e);
                setTimeout(connectWebSocket, 3000);
            }
        }
        
        // OSD Draw Loop: Bakes Camera frames AND overlays (Date, Time, Speed, GPS, Plate) together at 15 FPS (Smooth & light)
        function startOSDDrawLoop() {
            osdCanvas.width = 1280;
            osdCanvas.height = 720;

            if (osdInterval) clearInterval(osdInterval);

            // Draw every 66ms (15 FPS), saving huge CPU overhead and eliminating lag!
            osdInterval = setInterval(() => {
                if (!isRecording || !video.videoWidth) return;

                // 1. Draw raw camera frame
                osdCtx.drawImage(video, 0, 0, osdCanvas.width, osdCanvas.height);

                // 2. Draw black translucent banner at the bottom for HUD metadata
                osdCtx.fillStyle = 'rgba(0, 0, 0, 0.55)';
                osdCtx.fillRect(0, osdCanvas.height - 90, osdCanvas.width, 90);

                // 3. Draw Date & Time (Left bottom)
                const now = new Date();
                const dateStr = now.toLocaleDateString();
                const timeStr = now.toLocaleTimeString();
                osdCtx.fillStyle = '#ffffff';
                osdCtx.font = '22px Arial, sans-serif';
                osdCtx.fillText(`DATE: ${dateStr}   TIME: ${timeStr}`, 40, osdCanvas.height - 35);

                // 4. Draw Speed & License Plate (Center bottom)
                const speedText = `SPEED: ${currentSpeed.toFixed(1)} KM/H   PLATE: ${currentPlate}`;
                osdCtx.fillStyle = '#00ff88';
                osdCtx.font = 'bold 26px Arial, sans-serif';
                osdCtx.fillText(speedText, 400, osdCanvas.height - 35);

                // 5. Draw GPS Coordinates (Right bottom)
                const gpsText = `GPS: ${currentLat.toFixed(6)}, ${currentLng.toFixed(6)}`;
                osdCtx.fillStyle = '#ffffff';
                osdCtx.font = '20px Arial, sans-serif';
                osdCtx.fillText(gpsText, osdCanvas.width - 400, osdCanvas.height - 35);

            }, 66); // 15 FPS
        }

        // Start camera stream & hardware recorder
        async function startRecording() {
            try {
                // Fetch actual hardware camera stream
                mediaStream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: 1280 },
                        height: { ideal: 720 },
                        facingMode: 'environment',
                        frameRate: { ideal: 15 } // 15fps ideal matching drawing rates
                    },
                    audio: true // Captures real mic sound!
                });
                
                video.srcObject = mediaStream;
                videoTrack = mediaStream.getVideoTracks()[0];
                
                statusMessage.textContent = 'Creating recording session...';
                await createRecording();
                
                isRecording = true;

                // Start tracking location (to populate telemetry variables)
                startLocationTracking();

                // Start drawing OSD frames immediately
                startOSDDrawLoop();

                // 1. Initialize MediaRecorder for high-fidelity canvas stream recording
                recordedChunks = [];

                // Capture Canvas stream at 15fps
                const canvasStream = osdCanvas.captureStream(15);

                // Create combined stream to merge drawn video frames and mic audio
                const combinedStream = new MediaStream();
                combinedStream.addTrack(canvasStream.getVideoTracks()[0]);

                const audioTracks = mediaStream.getAudioTracks();
                if (audioTracks.length > 0) {
                    combinedStream.addTrack(audioTracks[0]);
                }

                // Detect most compatible system codecs (prefer MP4/H264, fallback to WebM)
                let recordingMimeType = 'video/mp4; codecs=h264';
                recExtension = 'mp4';

                if (!MediaRecorder.isTypeSupported(recordingMimeType)) {
                    recordingMimeType = 'video/mp4';
                    if (!MediaRecorder.isTypeSupported(recordingMimeType)) {
                        recordingMimeType = 'video/webm; codecs=h264';
                        recExtension = 'webm';
                        if (!MediaRecorder.isTypeSupported(recordingMimeType)) {
                            recordingMimeType = 'video/webm; codecs=vp9';
                            if (!MediaRecorder.isTypeSupported(recordingMimeType)) {
                                recordingMimeType = 'video/webm';
                            }
                        }
                    }
                }

                console.log(`Baking recording with: ${recordingMimeType}`);
                mediaRecorder = new MediaRecorder(combinedStream, { mimeType: recordingMimeType });
                mediaRecorder.ondataavailable = function(e) {
                    if (e.data && e.data.size > 0) {
                        recordedChunks.push(e.data);
                    }
                };
                mediaRecorder.start(1000); // collect chunks every second

                // 2. Start WebSocket base64 stream for real-time remote dashboard previews
                if (frameInterval) clearInterval(frameInterval);
                sendFrames();
                
                recordBtn.innerHTML = '<i class="fas fa-dot-circle"></i>';
                recordBtn.className = 'control-btn btn-start active';
                recordingStatus.textContent = 'RECORDING';
                recordingDot.className = 'recording-dot active';
                stopBtn.disabled = false;
                statusMessage.textContent = 'Recording live...';
                
            } catch (error) {
                console.error('Error starting recording:', error);
                statusMessage.textContent = 'Error: Camera / Mic permissions denied.';
                alert('Could not start recording. Please grant camera and microphone access.');
            }
        }
        
        // Create Recording Session on the API
        async function createRecording() {
            try {
                const response = await fetch('/api/recordings/videos/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        driver: 1,
                        vehicle: 1,
                        start_time: new Date().toISOString(),
                        start_latitude: currentLat || 0.0,
                        start_longitude: currentLng || 0.0,
                        is_emergency: false
                    })
                });
                
                if (!response.ok) throw new Error('API failure');
                
                const data = await response.json();
                recordingId = data.id;
                console.log('Recording session created:', recordingId);
            } catch (error) {
                console.warn('E: Failed to find defaults, seeding them now...');
                await setupDefaultData();
                const response = await fetch('/api/recordings/videos/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        driver: 1,
                        vehicle: 1,
                        start_time: new Date().toISOString(),
                        start_latitude: currentLat || 0.0,
                        start_longitude: currentLng || 0.0,
                        is_emergency: false
                    })
                });
                const data = await response.json();
                recordingId = data.id;
            }
        }
        
        // Auto seed client-side default configuration if missing
        async function setupDefaultData() {
            try {
                await fetch('/api/drivers/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: 'Default Driver',
                        license_number: 'DL12345',
                        phone: '1234567890'
                    })
                });
                
                await fetch('/api/vehicles/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        registration: currentPlate,
                        model: 'Default Model',
                        make: 'Default Make',
                        year: 2024,
                        color: 'White',
                        owner: 1
                    })
                });
            } catch (e) {
                console.log('Defaults check completed');
            }
        }
        
        // Stream lightweight base64 frames over WebSockets to completely eliminate lag!
        function sendFrames() {
            const previewCanvas = document.createElement('canvas');
            const previewCtx = previewCanvas.getContext('2d');
            previewCanvas.width = 480;  // Downscale preview to 480x270 for lag-free performance!
            previewCanvas.height = 270;

            frameInterval = setInterval(() => {
                if (!isRecording || !osdCanvas.width) return;
                
                // Draw lightweight preview frame from the main high-quality osdCanvas
                previewCtx.drawImage(osdCanvas, 0, 0, previewCanvas.width, previewCanvas.height);
                const frameData = previewCanvas.toDataURL('image/jpeg', 0.5);
                
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: 'video_frame',
                        frame: frameData,
                        timestamp: new Date().toISOString()
                    }));
                }
            }, 400); // 400ms interval saves 70% CPU/bandwidth, keeping recording fluid!
        }
        
        // GPS Telemetry Engine - strictly using real hardware inputs, with dynamic Haversine fallback if speed is null
        function startLocationTracking() {
            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }

            lastGpsTime = null;
            lastLat = null;
            lastLng = null;

            statusMessage.textContent = 'Locating device hardware GPS...';

            watchId = navigator.geolocation.watchPosition(
                (position) => {
                    const { latitude, longitude, speed, heading } = position.coords;

                    let speedKmh = 0;
                    const now = Date.now();

                    // Compute speed from hardware GPS or fallback to Haversine distance
                    if (speed !== null && speed !== undefined) {
                        speedKmh = speed * 3.6;
                    } else if (lastLat !== null && lastLng !== null && lastGpsTime !== null) {
                        const elapsedSeconds = (now - lastGpsTime) / 1000;
                        if (elapsedSeconds > 0.5) {
                            // Haversine formula
                            const R = 6371; // Earth radius in km
                            const dLat = (latitude - lastLat) * Math.PI / 180;
                            const dLng = (longitude - lastLng) * Math.PI / 180;
                            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                                      Math.cos(lastLat * Math.PI / 180) * Math.cos(latitude * Math.PI / 180) *
                                      Math.sin(dLng/2) * Math.sin(dLng/2);
                            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                            const distanceKm = R * c;
                            speedKmh = (distanceKm / elapsedSeconds) * 3600; // km/h

                            // Clean up jitter
                            if (speedKmh < 1.0) speedKmh = 0;
                        }
                    }

                    // Set current state parameters - absolutely binding GPS location and calculated speed!
                    currentLat = latitude;
                    currentLng = longitude;
                    currentSpeed = speedKmh;

                    lastLat = latitude;
                    lastLng = longitude;
                    lastGpsTime = now;

                    speedDisplay.innerHTML = `${speedKmh.toFixed(1)} <small>km/h</small>`;
                    gpsDisplay.innerHTML = `<i class="fas fa-location-arrow"></i> Lat: ${latitude.toFixed(6)}<br>Lng: ${longitude.toFixed(6)}`;
                    statusMessage.textContent = 'Real GPS Active';

                    sendGPSData(latitude, longitude, speedKmh, heading);
                },
                (error) => {
                    console.error('Real GPS error:', error);
                    statusMessage.textContent = 'GPS Error: Check permissions';
                    gpsDisplay.innerHTML = `<i class="fas fa-exclamation-triangle" style="color: #ff3b30;"></i> GPS Error`;
                },
                {
                    enableHighAccuracy: true,
                    timeout: 15000,
                    maximumAge: 0
                }
            );
        }

        function sendGPSData(lat, lng, speed, heading) {
            if (ws && ws.readyState === WebSocket.OPEN && recordingId) {
                ws.send(JSON.stringify({
                    type: 'gps_data',
                    recording_id: recordingId,
                    timestamp: new Date().toISOString(),
                    latitude: lat,
                    longitude: lng,
                    speed: speed,
                    altitude: 15.0,
                    accuracy: 3.0,
                    heading: heading || 0
                }));
            }
        }

        // Stop recording, trigger download to local storage, and patch actual recording.mp4/webm to server
        async function stopRecording() {
            isRecording = false;
            statusMessage.textContent = 'Saving high-quality capture...';

            // 1. Stop MediaRecorder
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }

            // 2. Clear visual trackers
            if (frameInterval) {
                clearInterval(frameInterval);
                frameInterval = null;
            }
            if (osdInterval) {
                clearInterval(osdInterval);
                osdInterval = null;
            }
            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
            
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
                videoTrack = null;
            }
            
            video.srcObject = null;
            currentSpeed = 0;
            
            // 3. Process video compile, local storage download, and API file upload
            setTimeout(async () => {
                if (recordedChunks.length > 0) {
                    const videoBlob = new Blob(recordedChunks, { type: mediaRecorder.mimeType || 'video/webm' });

                    // A. Trigger instant local download to device gallery / disk memory
                    const downloadUrl = URL.createObjectURL(videoBlob);
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = downloadUrl;
                    a.download = `dashcam_recording_${new Date().toISOString().replace(/[:.]/g, '-')}.${recExtension}`;
                    document.body.appendChild(a);
                    a.click();
                    setTimeout(() => {
                        document.body.removeChild(a);
                        window.URL.revokeObjectURL(downloadUrl);
                    }, 150);

                    // B. Send the ACTUAL baked video to database storage for web preview & AI processing
                    if (recordingId) {
                        const formData = new FormData();
                        formData.append('video_file', videoBlob, `recording.${recExtension}`);
                        formData.append('end_time', new Date().toISOString());

                        try {
                            const response = await fetch(`/api/recordings/videos/${recordingId}/`, {
                                method: 'PATCH',
                                body: formData
                            });
                            if (response.ok) {
                                statusMessage.textContent = 'Video saved locally & uploaded!';
                            } else {
                                statusMessage.textContent = 'Saved to gallery. Upload failed.';
                            }
                        } catch (e) {
                            console.error('Server upload failed:', e);
                            statusMessage.textContent = 'Saved to device storage!';
                        }
                    }
                } else {
                    statusMessage.textContent = 'Failed to compile media chunks.';
                }

                recordBtn.innerHTML = '<i class="fas fa-video"></i>';
                recordBtn.className = 'control-btn btn-start';
                recordingStatus.textContent = 'STOPPED';
                recordingDot.className = 'recording-dot';
                stopBtn.disabled = true;
                recordingId = null;
                mediaRecorder = null;
            }, 600);
        }
        
        // SOS / Emergency trigger
        async function triggerEmergency() {
            if (!recordingId) {
                statusMessage.textContent = 'SOS: Start recording first!';
                return;
            }
            
            emergencyIndicator.style.display = 'block';
            statusMessage.textContent = '🚨 SOS SIGNAL TRANSMITTED!';
            
            try {
                await fetch(`/api/recordings/videos/${recordingId}/add_emergency/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        latitude: currentLat,
                        longitude: currentLng,
                        speed_kmh: currentSpeed,
                        description: 'Emergency manual distress signal triggered by driver'
                    })
                });
            } catch (e) {
                console.error('SOS registration failed:', e);
            }
            
            if (navigator.vibrate) {
                navigator.vibrate([300, 100, 300, 100, 300]);
            }
            
            setTimeout(() => {
                emergencyIndicator.style.display = 'none';
                statusMessage.textContent = 'Ready';
            }, 4000);
        }
        
        // Button listeners
        recordBtn.addEventListener('click', () => {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        });
        
        stopBtn.addEventListener('click', stopRecording);
        emergencyBtn.addEventListener('click', triggerEmergency);
        
        // Initialize connections
        statusMessage.textContent = 'Connecting...';
        connectWebSocket();
        
        // Auto-detect mobile screen and prompt camera start
        if (/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
            setTimeout(startRecording, 1200);
        } else {
            // Seed defaults for easy desktop mock tracking
            setupDefaultData();
        }
        
        console.log('Mobile Camera and Telemetry Module initialized successfully.');
    </script>
</body>
</html>
